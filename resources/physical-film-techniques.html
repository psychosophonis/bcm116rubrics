<script type="text/markdown" id="content">
No fixed order — subtractive, additive, and splicing techniques can be combined or used alone. All three ask a version of the same question: can physically manipulating the filmstrip itself create new movement, rhythm, or meaning? Try a planned intervention, then an unplanned one, and compare.

## Subtractive: scratching & marking

**Materials:** needles, sandpaper, razor blades, steel wool.

- **Planned:** progressive scratches that move position frame to frame, growing or shrinking patterns, travelling marks.
- **Unplanned:** random scratching, dragging an object across the film.

**Investigate:** Can you animate a scratch? Does a rhythmic progression across frames create new movement?

## Splicing for temporal rhythm

**Materials:** film splicers, splicing tape, pre-cut segments of different lengths.

- **Planned:** deliberate temporal patterns — accelerating cuts, rhythmic beats, interruption sequences. Try single-frame cuts, regular beats, syncopated patterns.

**Investigate:** Can splicing alone create a musical or temporal effect, without touching the image itself?

## Additive: attaching material

**Materials:** hair, cellophane, tape, thread, pressed flowers or leaves, other translucent materials.

- **Planned:** move material deliberately across frames — hair that shifts position, cellophane that grows or shrinks.
- **Unplanned:** random placement, organic scattering.

**Investigate:** How do different materials create movement when positioned progressively across frames?

## Telecine & analysis

Run the manipulated film through the telecine machine and capture straight to digital, with immediate playback. Compare planned against unplanned interventions — what worked, what surprised you, where did new movement actually emerge? This is the same underlying question as Muybridge's own breakdown and reanimation of motion: successive differences, examined one frame at a time.

> None of this requires actual film stock to try the underlying idea. The same successive-differences question applies to a still image sliced into frames — see [Using Photoshop's Animation Tools](using-photoshops-animation-tools.html) for the technique.
