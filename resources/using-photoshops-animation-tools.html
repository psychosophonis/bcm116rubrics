There's a lot of expressive and aesthetic possibility in moving between analogue and digital media, and in mixing them so they animate — literally and figuratively — each other. This guide covers a set of custom browser tools plus a Photoshop workflow that support that kind of movement.

## The Browser Tools

Two browser-based tools let you take a folder of shot frames and turn them into either a **phenakistoscope** disc or a **flipbook**. Both run entirely client-side — nothing is uploaded anywhere — and both export a print-ready PDF, which you then cut out and assemble by hand. Full toolset: [psychosophonis.github.io/frame-animation-tools](https://psychosophonis.github.io/frame-animation-tools/).

**[The Phenakistoscope Tool](https://psychosophonis.github.io/frame-animation-tools/phenakistoscope-generator.html):**
Drop in a folder of numbered frames and it lays them out radially around a spinning disc, one wedge per printed page. Click a registration point that should stay fixed across every frame — a pivot, a joint, a fixed point on a rig — set a zoom, and that same crop is applied all the way round. Set how many divisions (segments) the disc has; 8 is the practical minimum for the illusion to read when spun, and there's no fixed maximum. A live preview flags overlapping frames and renders the full assembled disc before you print, and output splits across multiple sheets automatically if the disc is too large for one page — cut out the wedges and assemble around a shared centre point. The tool also has a blank mode: concentric ring templates, each ring with its own division count, for hand-drawing or collage directly onto guide lines with no photos involved. Because a phenakistoscope is viewed through a mirror while spinning, always print and test one wedge before committing a full sheet.

**[The Flipbook Tool](https://psychosophonis.github.io/frame-animation-tools/flipbook-generator.html):**
Drop in a folder of numbered frames and it imposes them four-up on A4 sheets sized to cut into A6 cards, with crop marks, borders and frame numbers so the stack cuts and reassembles in the right order. As with the disc tool, you pick a registration point that stays fixed across every frame so the flip reads cleanly, and choose between "contain" (whole frame, letterboxed) or "cover" (cropped to fill). A built-in flip-through preview lets you check the sequence reads correctly before printing, and there's an option to reverse play direction or choose bulk stack-cutting vs. cutting one sheet at a time.

If you're making a phenakistoscope, you can also export it as a PNG from the tool and test the spin digitally at [phenaspin.com](https://phenaspin.com), a phenakistoscope simulator.

The phenakistoscope tool also lets you print blank templates — with single or multi-ring guidelines at various sizes — for hand-drawn or collage experiments.

## Photoshop's Timeline Feature

The tools above expect a folder of frames as their starting point. Photoshop's Timeline feature is where you can make those frames in the first place, and — more usefully — where you can alter them by hand before they ever reach a generator. It's a powerful way to experiment with flash and re-animation techniques: import video frames as separate Photoshop layers, then step through those layers in the Animation Timeline, drawing, painting, or erasing on individual frames with the full range of Photoshop's tools — added marks, scratch textures, colour shifts, whatever the piece calls for. You can then export the finished timeline as a video, an animated GIF, or as numbered frames to feed into the Phenakistoscope or Flipbook tool above.

### Importing video as layers

1. Open the Timeline panel: **Window > Timeline**
2. **File > Import > Video Frames to Layers**
3. Step through the frames one by one. To paint or draw on a given frame, make sure its corresponding layer is also selected in the Layers panel.
4. Alter the frame.
5. Move to the next frame and repeat until complete.

### Animating a still image (e.g. a Muybridge motion study)

You don't need video to get frames into the Timeline. Muybridge's motion studies are already laid out as a grid of sequential frames in one image — slice that grid apart and Photoshop will treat it exactly like an imported video sequence.

1. Find a high-resolution image of a Muybridge motion study (or any other multi-frame contact sheet).
2. Use the **Slice tool** to cut it into individual frames. The slices need to align precisely and all be the same size, or the animation will jitter.
3. With only the frames selected: **File > Save for Web**, export as high-res JPG, and in the following dialog set **Slices** to **Selected Slices**, then **Save**. This exports each slice as its own numbered file.
4. Back in Photoshop: **File > Scripts > Load Files into Stack**, and select the folder or files you just exported. You can try the auto-align option, but it's unreliable — check it manually.
5. This produces a new file with each frame as its own layer, ready for the Timeline as in the video workflow above: **Window > Timeline**, then **Create Frame Animation**, then use the panel's menu (hamburger icon, top right of the Timeline) and choose **Make Frames from Layers**.
6. Test the playback, then export as below.

The same slice-and-stack approach works for any multi-frame source image, not just Muybridge — old chronophotography, contact sheets, printed comic strips.

### Exporting your animation

Once you've worked through your frame sequence, you have three export options:

- **As a GIF:** **File > Export > Save for Web**, choose GIF format, and set the animation loop option (bottom of the window) to **Forever**.
- **As a video:** **File > Export > Render Video**, then choose the appropriate export settings.
- **As individual frames** (for further manipulation, or for use in the Phenakistoscope or Flipbook tools): **File > Export > Layers to Files**, then choose your options. Photoshop will output all frames as JPGs into a folder.

To bring exported frames into the Phenakistoscope or Flipbook tool, open the tool and point it at that folder.
