## Reverse Engineering Process: From Edit to Shot List

### Step 1: Scene Analysis

**Watch your scene a couple of times.** Start by noting its characteristics:
- What are the lengths of the cuts?
- Where are the characters? What size are they in the frame?
- Where is the light coming from?
- Where are they looking and why?
- What type of shot is it? What is the shot doing in the scene?
- How is it cut with the shot before and after - what motivates each cut?

### Step 2: Location & Camera Position Analysis

- How many locations are there and what are their characteristics?
- How many different camera positions are there?
- Which shots share the same camera placement?

### Step 3: Build Your Shot List

- Build a list of takes based on location and camera placement
- Group shots by setup for efficient shooting order
- Mark coverage requirements: Master, singles, reverses, inserts
- Number your setups (Setup 1, Setup 2, etc.)

### Step 4: Planning & Role Assignment (25 minutes)

- Go over your chosen scene with the group
- Complete reverse engineering process together
- Build comprehensive shot list from your analysis
- Assign roles - but ensure everybody gets a go at all technical roles and it's not the same people doing the same things as last week

### Step 5: Reconstruction (50 minutes)

- Keep diagrams or a copy of the scene close for reference
- Do your best to emulate every aspect of the original shot focusing on composition, timing, and if possible lighting
- **The most important elements are the positions of bodies in the frame, timing and relationship between shots**
- Our aim is to get as close to the original as possible shot for shot in terms of timing and composition
- Performance, costuming and props is secondary to these other concerns for this exercise

### Step 6: Assembly & Comparison (15 minutes)

- Quick edit following original structure
- Screen reconstructions alongside originals

## Location Recording

This week we're adding location sound recording. We'll record dialogue using a shotgun microphone and boom.

**Signal-to-Noise Ratio:** Our primary concern is maximizing signal while minimizing noise. Once recorded together, they're inseparable - turn up dialogue and you also turn up the noise. We've "locked in" that ratio.

**Microphone Strategy:**
- Use directional microphones with good "off-axis rejection"
- Point microphone directly at the speaker's mouth for maximum signal
- Position environmental noise behind the microphone (off-axis)
- Get as close to source as possible without entering frame

**Boom Operation Technique:**
- Position microphone just above the frame line
- **Communication crucial:** Boom operator asks camera operator to identify top of frame
- Mark that position by finding distant visual reference that aligns with microphone end
- For dialogue between characters, move between positions to capture both
- Find braced position with fully extended arms for stability
- Alternative: If shot width makes booming difficult, organize separate location recorder, radio lapel, or plan to replace dialogue in post

## Lighting

Lighting is shaped by how large the source is and its position in relation to the object. The sun is a large, strong source that is far away. This makes its light diffuse and its softer. If we were to light a face with a torch light close to a face the other side of the face will be in shadow and the shadows will be quite defined and constrast high. Pay attention to the way a shots lighting creates areas of shadow and therefore gives objects shape. Flood the scene with light and everything becomes flat-looking - paint the shot with light and shadow to give objects shape and texture.

## Discord Investigation Prompts

**Post your discoveries:**
- How did analyzing the edit to build a shot list change your understanding of the scene?
- What camera positions were essential vs. impossible to replicate in your location?
- Which technical elements were hardest to recreate and why?
- What did you discover about how lighting/composition/eyelines actually work that you hadn't noticed?
- What broke when you tried to replicate certain techniques, and what does that reveal?

**Connect to broader investigation:**
- How might you strategically break these conventions or play with them for creative effect?

---

**Final Connection:** Continuity editing emerged from cinema's specific historical constraints - dark theaters with passive audiences, heavy static cameras, commercial entertainment needs. But for your 'Here We Are' projects investigating place and belonging, different approaches become possible:

- **Deep focus** for contemplative spatial exploration where viewers discover relationships within the frame
- **Kinesthetic camera movement** for investigating your physical relationship to places through choreographed movement
- **Tonal montage** for building emotional landscapes through textures and atmospheres of place
- **Intellectual montage** for revealing hidden power relationships about Country through collision between contrasting images
- **360 video** for surrounding exploration where viewers have agency over what to explore
- **Multi-screen work** for making internal conflicts about belonging visible across physical space

The question becomes: which of these approaches - or which combination - best serves your specific investigation of place and belonging? Remember, you're not choosing techniques to show off - you're choosing investigative apparatus that can reveal something about your relationship to place that wouldn't be possible otherwise.

## Learning Objectives

- Experience reverse engineering as method for understanding cinematic construction

- Identify what camera positions are essential vs. impossible to replicate and why
